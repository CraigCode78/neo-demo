<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo — Live Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 32px;
    }
    h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
    h1 span { color: #3b82f6; }
    .sub { color: #64748b; font-size: 0.9rem; }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }
    .card {
      background: #1e2330;
      border: 1px solid #2a3045;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .card .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .card .value { font-size: 1.6rem; font-weight: 700; color: #3b82f6; }
    .card .unit  { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    .badge {
      background: #22c55e22;
      border: 1px solid #22c55e55;
      color: #22c55e;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .footer { color: #64748b; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div>
    <h1>⚡ Neo <span>Deploy Demo</span></h1>
    <p class="sub" style="margin-top:6px;text-align:center">Built and deployed autonomously. Zero input from Craig.</p>
  </div>

  <div class="cards">
    <div class="card">
      <div class="label">Time to Build</div>
      <div class="value">&lt;30</div>
      <div class="unit">seconds</div>
    </div>
    <div class="card">
      <div class="label">Time to Deploy</div>
      <div class="value">&lt;60</div>
      <div class="unit">seconds</div>
    </div>
    <div class="card">
      <div class="label">Craig's input</div>
      <div class="value">0</div>
      <div class="unit">actions needed</div>
    </div>
  </div>

  <div class="badge">✅ Pipeline working</div>

  <p class="footer" id="ts"></p>

  <script>
    const d = new Date();
    document.getElementById('ts').textContent =
      'Deployed ' + d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) +
      ' at ' + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  </script>
</body>
</html>
